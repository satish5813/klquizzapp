# One Coolify app serves BOTH the API and the student client (same HTTPS origin).
# Build the React client (→ dist), then run the API server which serves dist.
providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
# full install (dev deps needed to build the client with vite/tsc)
cmds = ["npm ci"]

[phases.build]
# builds the student client into ./dist (served by the server)
cmds = ["npm run build"]

[start]
cmd = "node server/index.js"
